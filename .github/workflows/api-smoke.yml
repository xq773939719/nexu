name: API Tests (nexu)

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'prod'
        type: choice
        options:
          - dev
          - staging
          - prod
      test_tag:
        description: 'Test level'
        required: true
        default: '@smoke'
        type: choice
        options:
          - '@smoke'
          - '@P0'
          - '@P1'
          - '@P2'
          - '@P3'

# ── 环境开关说明 ───────────────────────────────────────────────────────────────
# 在仓库 Settings → Variables → Actions 中配置以下变量控制定时任务开关：
#   CI_ENABLE_DEV     = true / false
#   CI_ENABLE_STAGING = true / false
#   CI_ENABLE_PROD    = true / false  （不配置时默认开启）

jobs:
  # ── prod ─────────────────────────────────────────────────────────────────────
  test-prod:
    name: "[prod] API Tests"
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'pull_request') ||
      (github.event_name == 'schedule' && vars.CI_ENABLE_PROD != 'false') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'prod')
    uses: ./.github/workflows/_run-api-tests.yml
    with:
      environment: prod
      test_tag: ${{ github.event.inputs.test_tag || '@smoke' }}
    secrets:
      ENV_FILE: ${{ secrets.ENV_FILE_PROD }}
      NEXU_AUTOMATION_PAT: ${{ secrets.NEXU_AUTOMATION_PAT }}

  # ── staging ──────────────────────────────────────────────────────────────────
  test-staging:
    name: "[staging] API Tests"
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/develop') ||
      (github.event_name == 'schedule' && vars.CI_ENABLE_STAGING == 'true') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging')
    uses: ./.github/workflows/_run-api-tests.yml
    with:
      environment: staging
      test_tag: ${{ github.event.inputs.test_tag || '@smoke' }}
    secrets:
      ENV_FILE: ${{ secrets.ENV_FILE_STAGING }}
      NEXU_AUTOMATION_PAT: ${{ secrets.NEXU_AUTOMATION_PAT }}

  # ── dev ──────────────────────────────────────────────────────────────────────
  test-dev:
    name: "[dev] API Tests"
    if: |
      (github.event_name == 'schedule' && vars.CI_ENABLE_DEV == 'true') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'dev')
    uses: ./.github/workflows/_run-api-tests.yml
    with:
      environment: dev
      test_tag: ${{ github.event.inputs.test_tag || '@smoke' }}
    secrets:
      ENV_FILE: ${{ secrets.ENV_FILE_DEV }}
      NEXU_AUTOMATION_PAT: ${{ secrets.NEXU_AUTOMATION_PAT }}
