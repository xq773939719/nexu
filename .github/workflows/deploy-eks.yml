name: Deploy EKS

on:
  push:
    branches:
      - main
    paths:
      - "apps/api/**"
      - "apps/web/**"
      - "apps/gateway/**"
      - "packages/shared/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "package.json"
      - "tsconfig.base.json"
      - ".github/workflows/deploy-eks.yml"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1

concurrency:
  group: deploy-eks
  cancel-in-progress: true

jobs:
  docker:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - app: api
            dockerfile: apps/api/Dockerfile
            ecr_repository: nexu-api
          - app: web
            dockerfile: apps/web/Dockerfile
            ecr_repository: nexu-web
          - app: gateway
            dockerfile: apps/gateway/Dockerfile
            ecr_repository: nexu-gateway

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_GHA_ROLE_ARN }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Ensure ECR repository exists
        run: |
          aws ecr describe-repositories --repository-names "${{ matrix.ecr_repository }}" --region "$AWS_REGION" >/dev/null 2>&1 || \
          aws ecr create-repository --repository-name "${{ matrix.ecr_repository }}" --region "$AWS_REGION"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.login-ecr.outputs.registry }}/${{ matrix.ecr_repository }}
          tags: |
            type=sha,format=long
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          build-args: |
            COMMIT_HASH=${{ github.sha }}
            VITE_COMMIT_HASH=${{ github.sha }}
            VITE_AMPLITUDE_API_KEY=${{ secrets.VITE_AMPLITUDE_API_KEY }}
            VITE_AUTH_BASE_URL=${{ vars.VITE_AUTH_BASE_URL }}
            VITE_WHATSAPP_WA_ME_URL=${{ vars.VITE_WHATSAPP_WA_ME_URL }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.app }}
          cache-to: type=gha,mode=max,scope=${{ matrix.app }}

      - name: Persist image tag for sync job
        run: |
          echo "sha-${GITHUB_SHA}" > image_tag.txt

      - name: Upload image tag artifact
        uses: actions/upload-artifact@v4
        with:
          name: image-tag-${{ matrix.app }}
          path: image_tag.txt
          if-no-files-found: error

  sync-apps:
    name: Sync App Values to GitOps Repo
    runs-on: ubuntu-latest
    needs: docker
    steps:
      - name: Download image tag artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: image-tag-*
          path: artifacts

      - name: Validate image tag artifacts
        run: |
          set -euo pipefail

          test -f artifacts/image-tag-api/image_tag.txt || {
            echo "Missing artifacts/image-tag-api/image_tag.txt"
            exit 1
          }

          test -f artifacts/image-tag-web/image_tag.txt || {
            echo "Missing artifacts/image-tag-web/image_tag.txt"
            exit 1
          }

          test -f artifacts/image-tag-gateway/image_tag.txt || {
            echo "Missing artifacts/image-tag-gateway/image_tag.txt"
            exit 1
          }

          echo "Found required image tag artifacts"

      - name: Call Orbit sync API
        env:
          ORBIT_API_URL: ${{ vars.ORBIT_API_URL }}
          ORBIT_API_KEY: ${{ secrets.ORBIT_API_KEY }}
        run: |
          set -euo pipefail

          : "${ORBIT_API_URL:?ORBIT_API_URL is required}"
          : "${ORBIT_API_KEY:?ORBIT_API_KEY is required}"

          API_TAG=$(cat artifacts/image-tag-api/image_tag.txt)
          WEB_TAG=$(cat artifacts/image-tag-web/image_tag.txt)
          GATEWAY_TAG=$(cat artifacts/image-tag-gateway/image_tag.txt)

          PAYLOAD=$(jq -n \
            --arg apiTag "$API_TAG" \
            --arg webTag "$WEB_TAG" \
            --arg gatewayTag "$GATEWAY_TAG" \
            '{
              repository: "refly-ai/nexu-apps",
              environment: "prod",
              syncMode: "directCommit",
              changes: [
                {
                  application: "nexu",
                  valuesFilePath: "envs/prod/nexu/values.yaml",
                  valuesContent: ({
                    api: {image: {tag: $apiTag}},
                    web: {image: {tag: $webTag}},
                    gateway: {image: {tag: $gatewayTag}}
                  } | tojson)
                }
              ]
            }')

          echo "Sync payload:"
          echo "$PAYLOAD" | jq .

          RESPONSE=$(curl -fsS -X POST "$ORBIT_API_URL/api/app/sync" \
            -H "Content-Type: application/json" \
            -H "X-Orbit-API-Key: $ORBIT_API_KEY" \
            -d "$PAYLOAD")

          echo "Orbit sync response:"
          echo "$RESPONSE" | jq .

          SUCCESS=$(echo "$RESPONSE" | jq -r '.success // false')
          if [ "$SUCCESS" != "true" ]; then
            ERROR_MSG=$(echo "$RESPONSE" | jq -r '.error // .message // "Unknown error"')
            echo "Orbit sync failed: $ERROR_MSG"
            exit 1
          fi

          PR_URL=$(echo "$RESPONSE" | jq -r '.data.prUrl // .data.pullRequestUrl // .data.url // empty')
          if [ -n "$PR_URL" ]; then
            echo "Orbit sync succeeded: $PR_URL"
          else
            echo "Orbit sync succeeded"
          fi
