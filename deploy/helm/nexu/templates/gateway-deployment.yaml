apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "nexu.gateway.fullname" . }}
  namespace: {{ include "nexu.namespace" . }}
  labels:
    {{- include "nexu.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
spec:
  serviceName: {{ include "nexu.gateway.fullname" . }}
  ordinals:
    start: 1
  {{- if not .Values.gateway.hpa.enabled }}
  replicas: {{ .Values.gateway.replicas }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "nexu.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: gateway
  template:
    metadata:
      labels:
        {{- include "nexu.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: gateway
    spec:
      containers:
        - name: gateway
          image: "{{ .Values.gateway.image.repository }}:{{ .Values.gateway.image.tag }}"
          imagePullPolicy: {{ .Values.gateway.image.pullPolicy }}
          ports:
            - name: gateway
              containerPort: {{ .Values.gateway.service.port }}
              protocol: TCP
          env:
            - name: RUNTIME_API_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: {{ include "nexu.configMapName" . }}
                  key: NEXU_API_URL
            - name: INTERNAL_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "nexu.secretName" . }}
                  key: INTERNAL_API_TOKEN
            - name: ORDINAL
              valueFrom:
                fieldRef:
                  fieldPath: "metadata.labels['apps.kubernetes.io/pod-index']"
            - name: RUNTIME_POOL_ID
              value: gateway_pool_$(ORDINAL)
            - name: RUNTIME_MANAGE_OPENCLAW_PROCESS
              valueFrom:
                configMapKeyRef:
                  name: {{ include "nexu.configMapName" . }}
                  key: RUNTIME_MANAGE_OPENCLAW_PROCESS
                  optional: true
            - name: RUNTIME_POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: OPENCLAW_CONFIG_PATH
              value: /etc/openclaw/config.json
          volumeMounts:
            - name: openclaw-config
              mountPath: /etc/openclaw
          readinessProbe:
            tcpSocket:
              port: gateway
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            tcpSocket:
              port: gateway
            initialDelaySeconds: 20
            periodSeconds: 30
            timeoutSeconds: 5
          resources:
            {{- toYaml .Values.gateway.resources | nindent 12 }}
      volumes:
        - name: openclaw-config
          emptyDir: {}
