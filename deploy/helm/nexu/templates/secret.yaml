{{- if .Values.secret.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "nexu.secretName" . }}
  namespace: {{ include "nexu.namespace" . }}
  labels:
    {{- include "nexu.labels" . | nindent 4 }}
type: Opaque
stringData:
  DATABASE_URL: {{ .Values.secret.DATABASE_URL | quote }}
  BETTER_AUTH_SECRET: {{ .Values.secret.BETTER_AUTH_SECRET | quote }}
  ENCRYPTION_KEY: {{ .Values.secret.ENCRYPTION_KEY | quote }}
  INTERNAL_API_TOKEN: {{ .Values.secret.INTERNAL_API_TOKEN | quote }}
  GATEWAY_TOKEN: {{ .Values.secret.GATEWAY_TOKEN | quote }}
  SLACK_CLIENT_ID: {{ .Values.secret.SLACK_CLIENT_ID | quote }}
  SLACK_CLIENT_SECRET: {{ .Values.secret.SLACK_CLIENT_SECRET | quote }}
  SLACK_SIGNING_SECRET: {{ .Values.secret.SLACK_SIGNING_SECRET | quote }}
  LITELLM_BASE_URL: {{ .Values.secret.LITELLM_BASE_URL | quote }}
  LITELLM_API_KEY: {{ .Values.secret.LITELLM_API_KEY | quote }}
{{- end }}
