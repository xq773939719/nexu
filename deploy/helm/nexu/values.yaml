nameOverride: ""
fullnameOverride: ""

namespace:
  create: false
  name: nexu

global:
  labels: {}

config:
  PORT: "3000"
  NODE_ENV: "production"
  LOG_ERROR_STACK_LIMIT_LINES: "0"
  WEB_URL: "https://nexu.example.com"
  BETTER_AUTH_URL: "https://api.nexu.example.com"
  VITE_WHATSAPP_WA_ME_URL: "https://wa.me/15551846745?text=Hello%20Nexu"
  DEFAULT_MODEL_ID: "anthropic/claude-sonnet-4"
  RUNTIME_MANAGE_OPENCLAW_PROCESS: "true"
  EMAIL_SENDER: "Nexu <noreply@nexu.io>"
  COOKIE_DOMAIN: ""

secret:
  create: true
  existingSecretName: ""
  DATABASE_URL: "postgresql://nexu:CHANGEME@postgres:5432/nexu"
  BETTER_AUTH_SECRET: "CHANGEME-random-secret"
  ENCRYPTION_KEY: "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"
  INTERNAL_API_TOKEN: "CHANGEME-internal-token"
  GATEWAY_TOKEN: "CHANGEME-gateway-token"
  SKILL_API_TOKEN: "CHANGEME-skill-token"
  SLACK_CLIENT_ID: ""
  SLACK_CLIENT_SECRET: ""
  SLACK_SIGNING_SECRET: ""
  GOOGLE_CLIENT_ID: ""
  GOOGLE_CLIENT_SECRET: ""
  LITELLM_BASE_URL: ""
  LITELLM_API_KEY: ""
  RESEND_API_KEY: ""
  FEISHU_FEEDBACK_WEBHOOK_URL: ""
  FEISHU_FEEDBACK_CHAT_ID: ""

api:
  replicas: 2
  image:
    repository: nexu-api
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 3000
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 512Mi

web:
  replicas: 2
  image:
    repository: nexu-web
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 80
  resources:
    requests:
      cpu: 50m
      memory: 32Mi
    limits:
      cpu: 200m
      memory: 64Mi

gateway:
  replicas: 1
  image:
    repository: nexu-gateway
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 18789
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: "2"
      memory: 4Gi
  persistence:
    size: 20Gi
  hpa:
    enabled: true
    minReplicas: 1
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80

ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
  hosts:
    - host: nexu.example.com
      paths:
        - path: /v1
          pathType: Prefix
          service: api
        - path: /api
          pathType: Prefix
          service: api
        - path: /health
          pathType: Exact
          service: api
        - path: /openapi.json
          pathType: Exact
          service: api
        - path: /
          pathType: Prefix
          service: web
  tls: []
