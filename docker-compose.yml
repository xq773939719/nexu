services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: nexu
      POSTGRES_PASSWORD: nexu
      POSTGRES_DB: nexu_dev
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexu -d nexu_dev"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    profiles: ["full"]
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    env_file: apps/api/.env
    environment:
      DATABASE_URL: postgresql://nexu:nexu@postgres:5432/nexu_dev
      AUTO_SEED: "true"
      WEB_URL: http://localhost:8080
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN:-change-me-internal-token}
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/health').then(r=>{if(!r.ok)throw 1})"]
      interval: 10s
      timeout: 5s
      start_period: 15s
      retries: 3

  web:
    profiles: ["full"]
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_URL: http://localhost:3000
        VITE_WHATSAPP_WA_ME_URL: https://wa.me/15551846745?text=Hello%20Nexu
    depends_on:
      - api
    ports:
      - "8080:80"

  gateway:
    build:
      context: .
      dockerfile: apps/gateway/Dockerfile
    environment:
      RUNTIME_API_BASE_URL: ${RUNTIME_API_BASE_URL:-http://api:3000}
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN:-change-me-internal-token}
      RUNTIME_POOL_ID: ${RUNTIME_POOL_ID:-pool_local_01}
      RUNTIME_POD_IP: ${RUNTIME_POD_IP:-127.0.0.1}
      RUNTIME_MANAGE_OPENCLAW_PROCESS: ${RUNTIME_MANAGE_OPENCLAW_PROCESS:-true}
    ports:
      - "18789:18789"

volumes:
  pgdata:
